version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      majors:
        applies-to: version-updates
        update-types: ["major"]
    ignore:
      - dependency-name: "jose"
        update-types: ["version-update:semver-major"]
      # @trussworks/react-uswds requires peer focus-trap-react@^11; drop when it supports v12
      - dependency-name: "focus-trap-react"
        update-types: ["version-update:semver-major"]
      # keep @types/node on the major matching the node:24 Docker runtime
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
