name: CD

# Dev build workflow. Triggers on every push to `main` (including merge
# groups) and on manual dispatch. Builds the Query Connector Docker image
# and pushes it to GHCR tagged with `main`.
#
# When the push is a release (i.e. `app_version.yml` was bumped — handled
# by the `release.yml` workflow), this workflow skips the build to avoid
# duplicate image pushes.

on:
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
    steps:
      - name: Check Out Changes
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Detect version bump
        id: detect
        run: python3 .github/scripts/detect_version_bump.py

  build:
    needs: detect-release
    if: needs.detect-release.outputs.is_release != 'true'
    name: Build Query Connector Image
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
      packages: "write"
    steps:
      - name: Check Out Changes
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: lowercase repo name to use in following step
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}/query-connector
          tags: |
            type=raw,value=main

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
